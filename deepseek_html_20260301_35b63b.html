<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const rgbSpan = document.getElementById('rgb');
    const colorBox = document.getElementById('colorBox');
    const sendBtn = document.getElementById('sendBtn');

    let selectedColor = null;
    let img = new Image();

    // Получаем параметры из URL (их передаёт бот)
    const urlParams = new URLSearchParams(window.location.search);
    const fileId = urlParams.get('file_id');
    const photoUrl = urlParams.get('photo_url');

    if (!fileId) {
        alert('Ошибка: не получен идентификатор файла');
        tg.close();
    }

    if (!photoUrl) {
        alert('Ошибка: не получен URL фото');
        tg.close();
    }

    img.crossOrigin = 'Anonymous';
    img.src = photoUrl;
    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
    };

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = img.width / rect.width;
        const scaleY = img.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX);
        const y = Math.floor((e.clientY - rect.top) * scaleY);
        if (x < 0 || y < 0 || x >= img.width || y >= img.height) return;

        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const r = pixel[0], g = pixel[1], b = pixel[2];
        selectedColor = { r, g, b };
        rgbSpan.textContent = `RGB(${r},${g},${b})`;
        colorBox.style.backgroundColor = `rgb(${r},${g},${b})`;
        sendBtn.disabled = false;
    });

    sendBtn.addEventListener('click', () => {
        if (selectedColor) {
            tg.sendData(JSON.stringify(selectedColor));
            tg.close();
        }
    });
</script>
